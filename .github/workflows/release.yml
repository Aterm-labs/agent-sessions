# Release de la extensión de VS Code — construye el `.vsix` Community para cada
# plataforma soportada (cada uno empaqueta el sidecar `agent-sessions-cli`
# compilado desde el submódulo `aterm`), adjunta todos a una GitHub Release y,
# si los secrets existen, publica en Open VSX y en el Visual Studio Marketplace.
#
# Triggers:
#   - push de tag `v*` (release canónico)
#   - manual vía `workflow_dispatch` (dry-run desde Actions; sin release ni publish)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── .vsix por plataforma ────────────────────────────────────────────────
  build-vsix:
    name: vsix · ${{ matrix.vsce }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            vsce: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            vsce: linux-arm64
          # darwin-x64 cross-compila desde Apple Silicon (macos-14); los runners
          # macos-13 Intel escasean y se quedan colgados en cola.
          - os: macos-14
            target: x86_64-apple-darwin
            vsce: darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            vsce: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vsce: win32-x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # trae el core Rust (./aterm) para el sidecar

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: vsix-${{ matrix.vsce }}
          workspaces: aterm

      - name: npm ci
        run: npm ci

      - name: Build .vsix
        # El script bash funciona también bajo git-bash en el runner de Windows:
        # delega en cargo + vsce, que corren de forma nativa.
        shell: bash
        run: bash scripts/build-vsix.sh ${{ matrix.vsce }}

      - uses: actions/upload-artifact@v4
        with:
          name: agent-sessions-${{ matrix.vsce }}-vsix
          path: '*.vsix'
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-vsix]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artefacts
        run: |
          mkdir -p out
          find artifacts -type f -name '*.vsix' -exec mv {} out/ \;
          ls -la out/

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── Open VSX (marketplace abierto para forks de VS Code) ────────────────
  # Publica un .vsix por plataforma. Solo en push de tag y solo si el secret
  # OVSX_PAT está configurado; sin él es un no-op (no rompe el run).
  publish-openvsx:
    name: Publish to Open VSX
    needs: build-vsix
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          path: vsix
          pattern: agent-sessions-*-vsix

      - name: Publish each platform .vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT no configurado → omito la publicación en Open VSX." >&2
            exit 0
          fi
          # Idempotente: si el namespace ya existe, ignora el error.
          npx --yes ovsx create-namespace Zarritas -p "$OVSX_PAT" || true
          shopt -s globstar nullglob
          published=0
          for f in vsix/**/*.vsix; do
            echo "→ Publicando $f"
            npx --yes ovsx publish "$f" -p "$OVSX_PAT"
            published=$((published + 1))
          done
          if [ "$published" -eq 0 ]; then
            echo "No se encontró ningún .vsix para publicar." >&2
            exit 1
          fi

  # ── Visual Studio Marketplace (Microsoft) ───────────────────────────────
  # Publica un .vsix por plataforma con vsce. Solo en push de tag y solo si el
  # secret VSCE_PAT (Azure DevOps PAT con scope Marketplace > Manage) existe;
  # sin él es un no-op.
  publish-vsce:
    name: Publish to VS Marketplace
    needs: build-vsix
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          path: vsix
          pattern: agent-sessions-*-vsix

      - name: Publish each platform .vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT no configurado → omito la publicación en VS Marketplace." >&2
            exit 0
          fi
          shopt -s globstar nullglob
          published=0
          for f in vsix/**/*.vsix; do
            echo "→ Publicando $f"
            npx --yes @vscode/vsce publish --packagePath "$f" -p "$VSCE_PAT"
            published=$((published + 1))
          done
          if [ "$published" -eq 0 ]; then
            echo "No se encontró ningún .vsix para publicar." >&2
            exit 1
          fi
