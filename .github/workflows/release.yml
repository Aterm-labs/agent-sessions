# Release de la extensión de VS Code (Community) — construye el `.vsix`
# Community para cada plataforma soportada (cada uno empaqueta el sidecar
# `agent-sessions-cli` compilado desde el submódulo `aterm`) y lo adjunta a una
# GitHub Release como artefacto OSS.
#
# NOTA: la publicación a los marketplaces (Open VSX / VS Marketplace) NO se hace
# aquí. El paquete que va a los marketplaces es el OFICIAL (Community + módulo
# Pro, gateado por licencia), que se construye y publica desde el repo privado
# `aterm-pro` (su release.yml). Publicar también el Community aquí pisaría a la
# build oficial en el mismo extension id.
#
# Triggers:
#   - push de tag `v*` (release canónico)
#   - manual vía `workflow_dispatch` (dry-run desde Actions; sin release)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── .vsix por plataforma ────────────────────────────────────────────────
  build-vsix:
    name: vsix · ${{ matrix.vsce }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            vsce: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            vsce: linux-arm64
          # darwin-x64 cross-compila desde Apple Silicon (macos-14); los runners
          # macos-13 Intel escasean y se quedan colgados en cola.
          - os: macos-14
            target: x86_64-apple-darwin
            vsce: darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            vsce: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vsce: win32-x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # trae el core Rust (./aterm) para el sidecar

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: vsix-${{ matrix.vsce }}
          workspaces: aterm

      - name: npm ci
        run: npm ci

      - name: Build .vsix
        # El script bash funciona también bajo git-bash en el runner de Windows:
        # delega en cargo + vsce, que corren de forma nativa.
        shell: bash
        run: bash scripts/build-vsix.sh ${{ matrix.vsce }}

      - uses: actions/upload-artifact@v4
        with:
          name: agent-sessions-${{ matrix.vsce }}-vsix
          path: '*.vsix'
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-vsix]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artefacts
        run: |
          mkdir -p out
          find artifacts -type f -name '*.vsix' -exec mv {} out/ \;
          ls -la out/

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true
